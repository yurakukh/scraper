version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: test-mysql
    restart: always
    environment:
      MYSQL_DATABASE: vacancy_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: